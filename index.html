<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copper Earnings Calendar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="title">Copper Earnings Calendar</div>
  <div class="brand">BTG VOLT</div>
</header>

<div class="tabs">
  <button class="tab active" id="tab-comments">Comentários</button>
  <button class="tab" id="tab-calendar">Calendário</button>
</div>

<main>
  <div class="view" id="view-calendar">
    <div class="nav">
      <button id="prev">&#8592;</button>
      <div class="month-label" id="monthLabel"></div>
      <button id="next">&#8594;</button>
    </div>

    <div class="calendar">
      <div class="weekdays">
        <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="legend">
      Datas confirmadas oficialmente pelas próprias empresas (calendário de RI, RNS ou comunicado SEC/6-K).<br>
      Pesquisado em 26/06/2026.
    </div>
  </div>

  <div class="view active" id="view-comments">
    <div class="filter-bar">
      <input type="date" id="dateFilter" />
      <button id="clearFilter">Limpar</button>
    </div>
    <div class="feed" id="feed">
      <div class="feed-empty">Carregando...</div>
    </div>
  </div>
</main>

<footer>Copper Earnings Calendar — dados confirmados oficialmente</footer>

<script>
  const tabCalendar = document.getElementById('tab-calendar');
  const tabComments = document.getElementById('tab-comments');
  const viewCalendar = document.getElementById('view-calendar');
  const viewComments = document.getElementById('view-comments');

  tabCalendar.addEventListener('click', () => {
    tabCalendar.classList.add('active');
    tabComments.classList.remove('active');
    viewCalendar.classList.add('active');
    viewComments.classList.remove('active');
  });

  tabComments.addEventListener('click', () => {
    tabComments.classList.add('active');
    tabCalendar.classList.remove('active');
    viewComments.classList.add('active');
    viewCalendar.classList.remove('active');
  });
</script>
<script src="calendar.js"></script>
<script src="comments.js"></script>

</body>
</html>
