<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copper Earnings Calendar</title>
<style>
  :root{
    --navy:#0a1f44;
    --navy-light:#13335e;
    --white:#ffffff;
    --grey:#8a93a3;
    --border:#e6e9ef;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Helvetica Neue', Arial, sans-serif;
    background:var(--white);
    color:var(--navy);
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 48px 8px;
  }
  .title{
    font-size:20px;
    font-weight:600;
    letter-spacing:0.5px;
    color:var(--navy);
  }
  .brand{
    font-size:13px;
    font-weight:700;
    letter-spacing:2px;
    color:var(--navy);
    border:1px solid var(--navy);
    padding:4px 10px;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:24px 48px 48px;
  }
  .nav{
    display:flex;
    align-items:center;
    gap:28px;
    margin-bottom:24px;
  }
  .nav button{
    background:none;
    border:1px solid var(--navy);
    color:var(--navy);
    width:34px;
    height:34px;
    border-radius:50%;
    cursor:pointer;
    font-size:16px;
    line-height:1;
    transition:background .15s, color .15s;
  }
  .nav button:hover{
    background:var(--navy);
    color:var(--white);
  }
  .month-label{
    font-size:18px;
    font-weight:600;
    min-width:220px;
    text-align:center;
    letter-spacing:0.5px;
  }
  .calendar{
    width:100%;
    max-width:920px;
    border:1px solid var(--navy);
  }
  .weekdays, .grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
  }
  .weekdays div{
    text-align:center;
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    color:var(--white);
    background:var(--navy);
    padding:10px 0;
  }
  .day{
    position:relative;
    min-height:96px;
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:8px;
    background:var(--white);
  }
  .grid .day:nth-child(7n){
    border-right:none;
  }
  .day.empty{
    background:#fafbfc;
  }
  .day-num{
    font-size:12px;
    color:var(--grey);
    font-weight:500;
  }
  .day.has-event .day-num{
    color:var(--navy);
    font-weight:700;
  }
  .event{
    margin-top:6px;
    font-size:10.5px;
    line-height:1.3;
    background:var(--navy);
    color:var(--white);
    padding:4px 6px;
    border-radius:3px;
    margin-bottom:4px;
    cursor:default;
  }
  .event .co{
    font-weight:700;
    display:block;
  }
  .legend{
    margin-top:20px;
    font-size:11px;
    color:var(--grey);
    text-align:center;
    max-width:640px;
    line-height:1.6;
  }
  footer{
    text-align:center;
    font-size:11px;
    color:var(--grey);
    padding:14px;
    border-top:1px solid var(--border);
    letter-spacing:0.5px;
  }
</style>
</head>
<body>

<header>
  <div class="title">Copper Earnings Calendar</div>
  <div class="brand">BTG VOLT</div>
</header>

<main>
  <div class="nav">
    <button id="prev">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button id="next">&#8594;</button>
  </div>

  <div class="calendar">
    <div class="weekdays">
      <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="legend">
    Datas confirmadas oficialmente pelas próprias empresas (calendário de RI, RNS ou comunicado SEC/6-K).<br>
    Pesquisado em 26/06/2026.
  </div>
</main>

<footer>Copper Earnings Calendar — dados confirmados oficialmente</footer>

<script>
  // Eventos confirmados (aba "Confirmados")
  const events = {
    "2026-07-23": [
      { co: "Anglo American (AAL)", desc: "Relatório de Produção Q2 2026" },
      { co: "Teck Resources (TECK)", desc: "Teleconferência de resultados Q2 2026" }
    ],
    "2026-07-29": [
      { co: "Rio Tinto (RIO)", desc: "Resultado do 1º semestre de 2026" },
      { co: "Glencore (GLEN)", desc: "Relatório de Produção do 1º semestre 2026" }
    ],
    "2026-07-30": [
      { co: "Anglo American (AAL)", desc: "Resultado do 1º semestre de 2026" }
    ],
    "2026-08-05": [
      { co: "Glencore (GLEN)", desc: "Resultado do 1º semestre de 2026" }
    ],
    "2026-08-13": [
      { co: "Antofagasta plc (ANTO)", desc: "Resultado do 1º semestre de 2026" }
    ],
    "2026-08-18": [
      { co: "BHP Group (BHP)", desc: "Resultado do ano fiscal 2026 (encerrado 30/jun/26)" }
    ],
    "2026-10-20": [
      { co: "Anglo American (AAL)", desc: "Relatório de Produção Q3 2026" },
      { co: "BHP Group (BHP)", desc: "Relatório Operacional Q1 (ano fiscal 2027)" }
    ],
    "2026-10-29": [
      { co: "Glencore (GLEN)", desc: "Relatório de Produção Q3 2026" }
    ]
  };

  const monthNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

  let current = new Date(2026, 6, 1); // Julho 2026

  function render(){
    const year = current.getFullYear();
    const month = current.getMonth();
    document.getElementById('monthLabel').textContent = monthNames[month] + " " + year;

    const grid = document.getElementById('grid');
    grid.innerHTML = "";

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i = 0; i < firstDay; i++){
      const cell = document.createElement('div');
      cell.className = 'day empty';
      grid.appendChild(cell);
    }

    for(let d = 1; d <= daysInMonth; d++){
      const cell = document.createElement('div');
      const key = year + "-" + String(month+1).padStart(2,'0') + "-" + String(d).padStart(2,'0');
      const dayEvents = events[key];

      cell.className = 'day' + (dayEvents ? ' has-event' : '');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d;
      cell.appendChild(num);

      if(dayEvents){
        dayEvents.forEach(ev => {
          const tag = document.createElement('div');
          tag.className = 'event';
          tag.innerHTML = '<span class="co">' + ev.co + '</span>' + ev.desc;
          cell.appendChild(tag);
        });
      }

      grid.appendChild(cell);
    }
  }

  document.getElementById('prev').addEventListener('click', () => {
    current.setMonth(current.getMonth() - 1);
    render();
  });
  document.getElementById('next').addEventListener('click', () => {
    current.setMonth(current.getMonth() + 1);
    render();
  });

  render();
</script>

</body>
</html>
